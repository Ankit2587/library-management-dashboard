<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Library Dashboard</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logo">
            📚 Library Dashboard
        </div>

        <div class="user">
            <i class="fas fa-user-circle fa-2x"></i>
            <span>Admin</span>
        </div>

    </header>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <ul>

            <li>
                <a href="../index.html">
                    <i class="fas fa-chart-line"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="books.html">
                    <i class="fas fa-book"></i>
                    Books
                </a>
            </li>

            <li>
                <a href="statistics.html">
                    <i class="fas fa-chart-pie"></i>
                    Statistics
                </a>
            </li>

            <li>
                <a href="about.html">
                    <i class="fas fa-circle-info"></i>
                    About
                </a>
            </li>

            <li class="active">
                <a href="contact.html">
                    <i class="fas fa-phone"></i>
                    Contact
                </a>
            </li>

        </ul>

    </aside>

    <!-- MAIN -->

    <main class="main">

        <div class="page-title">
            <h1>Contact Us</h1>
        </div>

        <div class="activity">

            <h2>Get In Touch</h2>

            <br>

            <form id="contactForm">

                <input
                    type="text"
                    id="name"
                    placeholder="Enter Your Name"
                    required
                    style="width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:8px;">

                <input
                    type="email"
                    id="email"
                    placeholder="Enter Your Email"
                    required
                    style="width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:8px;">

                <input
                    type="text"
                    id="subject"
                    placeholder="Subject"
                    required
                    style="width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:8px;">

                <textarea
                    id="message"
                    placeholder="Write your message..."
                    required
                    style="width:100%;height:150px;padding:12px;border:1px solid #ddd;border-radius:8px;"></textarea>

                <br><br>

                <button
                    type="submit"
                    id="addBookBtn">

                    Send Message

                </button>

            </form>

        </div>

    </main>

    <script>

        document
            .getElementById("contactForm")
            .addEventListener(
                "submit",
                function (e) {

                    e.preventDefault();

                    Swal.fire({
                        icon: "success",
                        title: "Message Sent!",
                        text: "Thank you for contacting us.",
                        confirmButtonColor: "#2563eb"
                    });

                    this.reset();

                }
            );

    </script>

</body>

</html>
